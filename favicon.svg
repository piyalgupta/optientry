<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="OptiEntry">
  <defs>
    <linearGradient id="oe-bg" x1=".15" y1="0" x2=".85" y2="1">
      <stop offset="0" stop-color="#1b2440"/><stop offset=".55" stop-color="#0d1120"/><stop offset="1" stop-color="#07090f"/>
    </linearGradient>
    <radialGradient id="oe-glow" cx=".5" cy=".42" r=".62">
      <stop offset="0" stop-color="#1f6fd0" stop-opacity=".42"/><stop offset="1" stop-color="#1f6fd0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="oe-cool" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#1466D6"/><stop offset=".5" stop-color="#16A6E8"/><stop offset="1" stop-color="#7DEFFF"/>
    </linearGradient>
    <linearGradient id="oe-warm" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#F43F6E"/><stop offset=".5" stop-color="#FB8C3B"/><stop offset="1" stop-color="#FFD56A"/>
    </linearGradient>
    <radialGradient id="oe-gold" cx=".4" cy=".35" r=".75">
      <stop offset="0" stop-color="#FFF6D8"/><stop offset=".45" stop-color="#FCC44D"/><stop offset="1" stop-color="#F59E0B"/>
    </radialGradient>
  </defs>
  <!-- icon container -->
  <rect width="64" height="64" rx="15" fill="url(#oe-bg)"/>
  <rect width="64" height="64" rx="15" fill="url(#oe-glow)"/>
  <rect x=".75" y=".75" width="62.5" height="62.5" rx="14.25" fill="none" stroke="#fff" stroke-opacity=".09"/>
  <path d="M2 18 A15 15 0 0 1 32 1 A15 15 0 0 1 62 18" fill="none" stroke="#fff" stroke-opacity=".05" stroke-width="1.2"/>
  <!-- precision aperture ring (Opti) -->
  <path d="M48.82 28.17 A17.5 17.5 0 1 1 35.64 15.88" fill="none" stroke="url(#oe-cool)" stroke-width="5.4" stroke-linecap="round"/>
  <!-- dark casing so the breakout reads in front of the ring -->
  <path d="M22.5 44 L44 22.4" fill="none" stroke="#0a0d18" stroke-width="9" stroke-linecap="round"/>
  <!-- breakout trajectory + arrowhead (Entry) -->
  <path d="M22.5 44 L43.4 23" fill="none" stroke="url(#oe-warm)" stroke-width="4.8" stroke-linecap="round"/>
  <path d="M51 15 L47.7 27.2 L38.9 18.5 Z" fill="url(#oe-warm)"/>
  <!-- optimal entry node -->
  <circle cx="22.5" cy="44" r="6.4" fill="#F59E0B" fill-opacity=".18"/>
  <circle cx="22.5" cy="44" r="4.5" fill="url(#oe-gold)"/>
  <circle cx="22.5" cy="44" r="1.6" fill="#fff" fill-opacity=".92"/>
</svg>
